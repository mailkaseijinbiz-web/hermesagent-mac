name: HermesCustom
options:
  bundleIdPrefix: com.custom
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: "576D2UUHH5"      # KEITA YASUI — paid Individual (CloudKit-capable)
    CODE_SIGN_STYLE: Automatic
    # Swift 5 language mode: Xcode-beta's newer compiler enforces Swift 6 strict
    # concurrency as hard errors (e.g. the 'acc' capture in delegate(to:task:)),
    # which the current SPM build (older toolchain) does not. Match the
    # runtime-validated behavior for now; a Swift 6 concurrency cleanup is separate work.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  HermesShared:
    path: ../HermesShared

targets:
  HermesCustom:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets          # app icon (AppIcon set, compiled into Assets.car)
    dependencies:
      - package: HermesShared
      - sdk: libsqlite3.tbd            # StateDB links SQLite3 directly
    settings:
      base:
        PRODUCT_NAME: HermesCustom
        PRODUCT_BUNDLE_IDENTIFIER: com.custom.hermesmac
        CODE_SIGN_ENTITLEMENTS: HermesCustom.entitlements
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon      # compiles Assets.xcassets/AppIcon → CFBundleIconName
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "音声入力（音声をテキストに変換）に使用します。"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "話した内容をテキストに変換するために音声認識を使用します。"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        # Non-sandboxed: the app spawns git/gh/hermes, runs a local server on :9119,
        # and reads ~/.hermes/state.db. App Sandbox would break all of that, and
        # CloudKit works fine without it for development/Developer ID signing.
